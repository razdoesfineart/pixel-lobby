<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Guild &mdash; Character Select</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg1:#0a0a1a;--bg2:#1a1a2e;
  --card:#16213e;--card-b:#2a2a4a;
  --gold:#f0c040;--gold-d:#a08020;
  --txt:#c8c8d8;--txt-d:#7878a0;
}

html{font-size:16px}
body{
  background:linear-gradient(170deg,var(--bg1),var(--bg2));
  min-height:100vh;
  font-family:'Press Start 2P',monospace;
  color:var(--txt);
  overflow-x:hidden;
  position:relative;
}

/* Scanlines */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);
  pointer-events:none;z-index:9999;
}

/* ── Particles ── */
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{
  position:absolute;border-radius:50%;
  animation:pfloat linear infinite;opacity:0;
}
@keyframes pfloat{
  0%{transform:translateY(0) translateX(0);opacity:0}
  8%{opacity:.7}
  90%{opacity:.2}
  100%{transform:translateY(-105vh) translateX(25px);opacity:0}
}

/* ── Container ── */
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:18px 16px 30px}

/* ── Banner ── */
.banner{text-align:center;padding:22px 0 12px}
.banner h1{
  font-size:1.8rem;color:var(--gold);letter-spacing:6px;
  text-shadow:0 0 20px rgba(240,192,64,.45),0 0 40px rgba(240,192,64,.2),0 2px 0 #705010;
}
.banner .sub{font-size:.5rem;color:var(--txt-d);margin-top:8px;letter-spacing:4px;text-transform:uppercase}
.bline{height:2px;background:linear-gradient(90deg,transparent,var(--gold-d),var(--gold),var(--gold-d),transparent);margin:14px auto 0;max-width:560px;opacity:.55}

/* ── Grid ── */
.grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
  max-width:920px;margin:22px auto;
}

/* ── Card ── */
.card{
  position:relative;
  background:linear-gradient(180deg,#1c2541,#0f1628);
  border:2px solid var(--card-b);border-radius:8px;
  padding:18px 8px 14px;text-align:center;cursor:pointer;
  transition:transform .25s,border-color .3s,box-shadow .3s;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 38%,var(--cc,transparent),transparent 70%);
  opacity:.05;transition:opacity .3s;pointer-events:none;
}
.card:hover{
  transform:translateY(-6px);
  border-color:color-mix(in srgb,var(--cc) 65%,#fff 35%);
  box-shadow:0 8px 22px rgba(0,0,0,.4),0 0 14px color-mix(in srgb,var(--cc) 35%,transparent);
}
.card:hover::before{opacity:.14}
.card.sel{
  border-color:var(--gold);
  box-shadow:0 0 18px rgba(240,192,64,.28),0 0 36px rgba(240,192,64,.1);
  transform:translateY(-4px);
}
.card.sel::before{opacity:.18}
.card.sel::after{
  content:'';position:absolute;inset:-2px;border:2px solid var(--gold);border-radius:8px;
  animation:gpulse 2s ease-in-out infinite;pointer-events:none;
}
@keyframes gpulse{
  0%,100%{opacity:.25;box-shadow:0 0 6px rgba(240,192,64,.15)}
  50%{opacity:.75;box-shadow:0 0 16px rgba(240,192,64,.35)}
}

/* ── Sprite (card) ── */
.sw{position:relative;width:64px;height:64px;margin:0 auto 10px}
.sglow{
  position:absolute;inset:-10px;border-radius:50%;
  background:radial-gradient(circle,var(--cc),transparent 70%);
  opacity:.22;filter:blur(7px);transition:opacity .3s;
}
.card:hover .sglow,.card.sel .sglow{opacity:.45}
.simg{
  width:64px;height:64px;
  image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;
  position:relative;z-index:1;
  animation:breathe 2.6s ease-in-out infinite;
  transition:transform .2s;
}
@keyframes breathe{
  0%,100%{transform:scaleY(1) scaleX(1)}
  50%{transform:scaleY(1.025) scaleX(.985)}
}
.card:hover .simg{transform:scale(1.08)}
.simg.atk{animation:atkflash .35s ease-out}
@keyframes atkflash{
  0%{transform:scale(1);filter:brightness(1)}
  30%{transform:scale(1.22) rotate(-6deg);filter:brightness(1.8)}
  60%{transform:scale(1.14) rotate(4deg);filter:brightness(1.35)}
  100%{transform:scale(1);filter:brightness(1)}
}

/* ── Card text ── */
.cname{font-size:.48rem;color:#e0e0f0;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.ccls{
  font-size:.36rem;color:var(--cc);
  display:flex;align-items:center;justify-content:center;gap:5px;line-height:1.4;
}
.cicon{width:10px;height:10px;flex-shrink:0}

/* ── Info Panel ── */
.info{
  max-width:920px;margin:6px auto 20px;
  background:linear-gradient(180deg,#141830,#0c1020);
  border:2px solid var(--card-b);border-radius:10px;
  padding:26px 28px;display:flex;gap:28px;min-height:270px;
  position:relative;overflow:hidden;
}
.info::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 8% 50%,var(--pc,transparent),transparent 50%);
  opacity:.06;pointer-events:none;
}

/* Info left */
.ileft{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;width:140px;position:relative}
.iglw{
  position:absolute;width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,var(--pc),transparent 70%);
  opacity:.3;filter:blur(14px);top:50%;left:50%;transform:translate(-50%,-55%);
}
.ispr{
  width:96px;height:96px;
  image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;
  position:relative;z-index:1;
  animation:breathe 2.6s ease-in-out infinite;
}
.icls{font-size:.42rem;color:var(--pc);margin-top:10px;text-transform:uppercase;letter-spacing:2px;position:relative;z-index:1}

/* Info right */
.iright{flex:1;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;min-width:0}
.iname{font-size:1.05rem;color:var(--gold);text-shadow:0 0 12px rgba(240,192,64,.3)}
.iflav{font-size:.4rem;color:var(--txt-d);line-height:1.9;max-width:560px}

/* Stats */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px 20px}
.srow{display:flex;align-items:center;gap:7px}
.slbl{font-size:.38rem;color:var(--txt-d);width:28px;flex-shrink:0}
.sbbg{flex:1;height:10px;background:#0a0e1a;border-radius:2px;border:1px solid #2a2a3a;overflow:hidden;position:relative}
.sbfill{height:100%;border-radius:1px;transition:width .55s cubic-bezier(.25,.8,.25,1);position:relative}
.sbfill::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 60%)}
.sval{font-size:.33rem;color:var(--txt);width:22px;text-align:right;flex-shrink:0}

/* Abilities */
.absec{margin-top:2px}
.abtitle{font-size:.38rem;color:var(--gold-d);margin-bottom:7px;letter-spacing:2px;text-transform:uppercase}
.ablist{display:flex;gap:10px;flex-wrap:wrap}
.abtag{
  font-size:.36rem;color:var(--txt);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:4px;padding:5px 10px;
  display:flex;align-items:center;gap:6px;
  transition:border-color .2s,background .2s;
}
.abtag:hover{border-color:var(--pc);background:rgba(255,255,255,.07)}
.abico{font-size:.48rem;line-height:1}

/* Footer */
.foot{text-align:center;font-size:.36rem;color:var(--txt-d);padding:0 0 20px;letter-spacing:2px;opacity:.55}

/* Responsive */
@media(max-width:900px){
  .grid{grid-template-columns:repeat(4,1fr);gap:10px}
  .info{flex-direction:column;align-items:center;text-align:center}
  .sgrid{grid-template-columns:1fr}
  .ablist{justify-content:center}
}
@media(max-width:640px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .banner h1{font-size:1.1rem;letter-spacing:3px}
}
</style>
</head>
<body>
<div id="particles"></div>
<div id="selectScreen"><div class="wrap">
  <div class="banner">
    <h1>NEBULA GUILD</h1>
    <div class="sub">Choose Your Champion</div>
    <div class="bline"></div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="info" id="info">
    <div class="ileft">
      <div class="iglw" id="iglw"></div>
      <img class="ispr" id="ispr" alt="">
      <div class="icls" id="icls"></div>
    </div>
    <div class="iright">
      <div class="iname" id="iname"></div>
      <div class="iflav" id="iflav"></div>
      <div class="sgrid" id="sgrid"></div>
      <div class="absec">
        <div class="abtitle">Abilities</div>
        <div class="ablist" id="ablist"></div>
      </div>
    </div>
  </div>
<div style="text-align:center;margin:20px auto 10px;">
  <button id="innBtn" onclick="document.getElementById('selectScreen').style.display='none';document.getElementById('innScreen').style.display='block';initInn();" style="
    font-family:'Press Start 2P',monospace;
    font-size:.65rem;
    color:#f0c040;
    background:linear-gradient(180deg,#2a1a0a,#1a0e04);
    border:2px solid #8b6914;
    border-radius:6px;
    padding:14px 36px;
    cursor:pointer;
    letter-spacing:3px;
    text-transform:uppercase;
    text-shadow:0 0 10px rgba(240,192,64,.5);
    box-shadow:0 0 20px rgba(240,192,64,.15),inset 0 1px 0 rgba(255,255,255,.08);
    transition:all .3s;
  " onmouseover="this.style.boxShadow='0 0 30px rgba(240,192,64,.35),inset 0 1px 0 rgba(255,255,255,.12)';this.style.transform='translateY(-2px)';this.style.borderColor='#f0c040'" onmouseout="this.style.boxShadow='0 0 20px rgba(240,192,64,.15),inset 0 1px 0 rgba(255,255,255,.08)';this.style.transform='translateY(0)';this.style.borderColor='#8b6914'">&#9881; Enter The Inn</button>
</div>
  <div class="foot">Click a character to select &middot; Arrow keys to navigate</div>
</div>
</div>

<div id="innScreen" style="display:none;position:relative;z-index:1;">
  <div style="text-align:center;padding:16px 0 8px;">
    <button onclick="document.getElementById('innScreen').style.display='none';document.getElementById('selectScreen').style.display='block';" style="
      font-family:'Press Start 2P',monospace;font-size:.45rem;color:#f0c040;
      background:linear-gradient(180deg,#2a1a0a,#1a0e04);border:2px solid #8b6914;
      border-radius:4px;padding:8px 20px;cursor:pointer;letter-spacing:2px;
      text-shadow:0 0 8px rgba(240,192,64,.4);transition:all .3s;
    ">&larr; Back to Select</button>
  </div>
  <canvas id="innCanvas" style="display:block;margin:0 auto;image-rendering:pixelated;image-rendering:-moz-crisp-edges;image-rendering:crisp-edges;border:2px solid #2a2a4a;border-radius:8px;"></canvas>
  <div style="text-align:center;padding:12px;font-family:'Press Start 2P',monospace;font-size:.36rem;color:#7878a0;letter-spacing:2px;opacity:.55;">The Nebula Guild rests at the tavern</div>
</div>

/* ── Build grid ── */
const grid=document.getElementById('grid');
C.forEach((c,i)=>{
  const d=document.createElement('div');
  d.className='card'+(i===0?' sel':'');
  d.style.setProperty('--cc',c.color);
  d.dataset.i=i;
  d.innerHTML=`
    <div class="sw">
      <div class="sglow"></div>
      <img class="simg" src="${SPRITE_URIS[c.name]}" alt="${c.name}" draggable="false">
    </div>
    <div class="cname">${c.name}</div>
    <div class="ccls">
      <svg class="cicon" viewBox="0 0 10 10">${c.icon}</svg>
      ${c.cls}
    </div>`;
  d.addEventListener('click',()=>pick(i));
  grid.appendChild(d);
});

/* ── Select ── */
function pick(i){
  const cards=document.querySelectorAll('.card');
  cards[sel].classList.remove('sel');
  sel=i;
  cards[i].classList.add('sel');
  const sp=cards[i].querySelector('.simg');
  sp.classList.remove('atk');
  void sp.offsetWidth;
  sp.classList.add('atk');
  setTimeout(()=>sp.classList.remove('atk'),400);
  show(i);
}

/* ── Info panel ── */
function show(i){
  const c=C[i],p=document.getElementById('info');
  p.style.setProperty('--pc',c.color);
  document.getElementById('ispr').src=SPRITE_URIS[c.name];
  document.getElementById('iglw').style.background=`radial-gradient(circle,${c.color},transparent 70%)`;
  document.getElementById('iname').textContent=c.name;
  document.getElementById('icls').textContent=c.cls;
  document.getElementById('icls').style.color=c.color;
  document.getElementById('iflav').textContent=c.flavor;

  const stats=[
    {k:'hp',l:'HP',v:c.hp},{k:'atk',l:'ATK',v:c.atk},
    {k:'def',l:'DEF',v:c.def},{k:'spd',l:'SPD',v:c.spd},{k:'int',l:'INT',v:c.int}
  ];
  const sg=document.getElementById('sgrid');
  sg.innerHTML=stats.map(s=>`
    <div class="srow">
      <span class="slbl">${s.l}</span>
      <div class="sbbg"><div class="sbfill" data-w="${s.v}" style="width:0%;background:${SC[s.k]}"></div></div>
      <span class="sval">${s.v}</span>
    </div>`).join('');

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    sg.querySelectorAll('.sbfill').forEach(b=>b.style.width=b.dataset.w+'%');
  }));

  document.getElementById('ablist').innerHTML=c.abilities.map((a,j)=>
    `<div class="abtag"><span class="abico">${c.abIcons[j]}</span>${a}</div>`
  ).join('');
}

/* ── Keyboard ── */
document.addEventListener('keydown',e=>{
  let n=sel;
  if(e.key==='ArrowRight')n=Math.min(7,sel+1);
  else if(e.key==='ArrowLeft')n=Math.max(0,sel-1);
  else if(e.key==='ArrowDown')n=Math.min(7,sel+4);
  else if(e.key==='ArrowUp')n=Math.max(0,sel-4);
  else return;
  e.preventDefault();
  if(n!==sel)pick(n);
});

/* ── Particles ── */
(function(){
  const box=document.getElementById('particles');
  for(let i=0;i<45;i++){
    const p=document.createElement('div');
    p.className='particle';
    const sz=1.5+Math.random()*2.5,
          dur=7+Math.random()*10,
          del=Math.random()*dur,
          hue=25+Math.random()*35;
    p.style.cssText=`
      left:${Math.random()*100}%;bottom:-10px;
      width:${sz}px;height:${sz}px;
      background:hsla(${hue},80%,62%,.55);
      animation-duration:${dur}s;animation-delay:-${del}s;`;
    box.appendChild(p);
  }
})();

/* ── Init ── */
show(0);


/* ===== INN TAVERN SCENE ===== */
let innInitialized = false;
function initInn() {
  if (innInitialized) return;
  innInitialized = true;

  const canvas = document.getElementById('innCanvas');
  const ctx = canvas.getContext('2d');

  // Size
  const W = 960, H = 560;
  canvas.width = W; canvas.height = H;
  canvas.style.maxWidth = '960px';
  canvas.style.width = '100%';

  // Load sprites
  const sprites = {};
  const names = Object.keys(SPRITE_URIS);
  let loaded = 0;
  names.forEach(n => {
    const img = new Image();
    img.onload = () => { sprites[n] = img; loaded++; if(loaded===names.length) startInn(); };
    img.src = SPRITE_URIS[n];
  });

  // Tavern character positions (seated at tables, at bar, standing)
  const positions = [
    { name:"Nebula", x:480, y:320, scale:1.1, seat:"throne" },
    { name:"PR Monitor", x:180, y:340, scale:0.95, seat:"table-left" },
    { name:"Deploy Mon", x:300, y:360, scale:0.9, seat:"table-left" },
    { name:"Sprint", x:660, y:350, scale:0.9, seat:"table-right" },
    { name:"Web Agent", x:120, y:280, scale:0.85, seat:"bar" },
    { name:"Code Agent", x:780, y:340, scale:0.95, seat:"standing" },
    { name:"Media", x:560, y:370, scale:0.85, seat:"table-right" },
    { name:"Inbox", x:840, y:290, scale:0.85, seat:"bar" },
  ];

  function startInn() {
    let t = 0;

    function drawTavern() {
      ctx.clearRect(0, 0, W, H);

      // Background - dark wooden interior
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, '#1a0e04');
      bgGrad.addColorStop(0.3, '#2a1808');
      bgGrad.addColorStop(1, '#0d0804');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Back wall
      ctx.fillStyle = '#2d1a0a';
      ctx.fillRect(0, 0, W, 200);
      // Wall planks
      for (let i = 0; i < 8; i++) {
        ctx.strokeStyle = 'rgba(60,35,15,0.6)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 25 + i * 25);
        ctx.lineTo(W, 25 + i * 25);
        ctx.stroke();
      }
      // Vertical beams
      for (let i = 0; i < 5; i++) {
        const bx = 60 + i * 220;
        ctx.fillStyle = '#3d2210';
        ctx.fillRect(bx, 0, 18, 200);
        ctx.fillStyle = '#4a2a14';
        ctx.fillRect(bx + 2, 0, 2, 200);
      }

      // Ceiling beams
      for (let i = 0; i < 4; i++) {
        const by = 10 + i * 15;
        ctx.fillStyle = '#3d2210';
        ctx.fillRect(0, by, W, 6);
      }

      // Hanging lanterns
      const lanterns = [160, 380, 600, 800];
      lanterns.forEach((lx, li) => {
        const sway = Math.sin(t * 0.015 + li * 1.5) * 8;
        // Chain
        ctx.strokeStyle = '#666';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(lx, 50);
        ctx.lineTo(lx + sway, 110);
        ctx.stroke();
        // Lantern body
        ctx.fillStyle = '#8b6914';
        ctx.fillRect(lx + sway - 8, 110, 16, 20);
        // Glow
        const glow = ctx.createRadialGradient(lx + sway, 120, 2, lx + sway, 120, 80 + Math.sin(t * 0.04 + li) * 10);
        glow.addColorStop(0, 'rgba(255,180,60,0.35)');
        glow.addColorStop(0.5, 'rgba(255,140,30,0.08)');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fillRect(lx + sway - 100, 40, 200, 200);
        // Flame
        ctx.fillStyle = `rgba(255,${180 + Math.sin(t*0.1+li)*30},60,0.9)`;
        ctx.beginPath();
        ctx.arc(lx + sway, 118, 3 + Math.sin(t*0.08+li)*1, 0, Math.PI*2);
        ctx.fill();
      });

      // Floor
      const floorGrad = ctx.createLinearGradient(0, 200, 0, H);
      floorGrad.addColorStop(0, '#3d2210');
      floorGrad.addColorStop(1, '#1a0e06');
      ctx.fillStyle = floorGrad;
      ctx.fillRect(0, 200, W, H - 200);

      // Floor planks
      for (let i = 0; i < 20; i++) {
        ctx.strokeStyle = 'rgba(80,45,20,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 200 + i * 20);
        ctx.lineTo(W, 200 + i * 20);
        ctx.stroke();
      }
      // Floor vertical seams
      for (let i = 0; i < 12; i++) {
        const fx = 40 + i * 80 + (i % 2) * 40;
        ctx.strokeStyle = 'rgba(80,45,20,0.25)';
        ctx.beginPath();
        ctx.moveTo(fx, 200);
        ctx.lineTo(fx, H);
        ctx.stroke();
      }

      // Bar counter (back)
      ctx.fillStyle = '#4a2a14';
      ctx.fillRect(30, 230, 180, 30);
      ctx.fillStyle = '#5a3418';
      ctx.fillRect(30, 228, 180, 4);
      // Bar shelves with bottles
      ctx.fillStyle = '#3d2210';
      ctx.fillRect(40, 140, 160, 6);
      ctx.fillRect(40, 175, 160, 6);
      const bottleColors = ['#8b1a1a','#1a6b1a','#c8a020','#3a3ac0','#8b4513','#cc4488','#20a0a0','#aa6633'];
      bottleColors.forEach((bc, bi) => {
        const bx = 52 + bi * 19;
        ctx.fillStyle = bc;
        ctx.fillRect(bx, 148, 6, 26);
        ctx.fillRect(bx + 1, 143, 4, 6);
      });
      // Second shelf bottles
      bottleColors.slice().reverse().forEach((bc, bi) => {
        const bx = 52 + bi * 19;
        ctx.fillStyle = bc;
        ctx.globalAlpha = 0.7;
        ctx.fillRect(bx, 183, 6, 18);
        ctx.fillRect(bx + 1, 179, 4, 5);
        ctx.globalAlpha = 1;
      });

      // Bar counter right side
      ctx.fillStyle = '#4a2a14';
      ctx.fillRect(720, 240, 210, 25);
      ctx.fillStyle = '#5a3418';
      ctx.fillRect(720, 238, 210, 4);
      // Mugs on bar
      [740, 780, 860, 900].forEach(mx => {
        ctx.fillStyle = '#8b6914';
        ctx.fillRect(mx, 225, 12, 14);
        ctx.fillStyle = '#a07818';
        ctx.fillRect(mx + 12, 228, 4, 8);
      });

      // Tables
      // Left table
      ctx.fillStyle = '#5a3418';
      ctx.fillRect(200, 350, 120, 8);
      ctx.fillStyle = '#4a2a14';
      ctx.fillRect(230, 358, 12, 40);
      ctx.fillRect(290, 358, 12, 40);
      // Items on left table
      ctx.fillStyle = '#8b6914';
      ctx.fillRect(220, 340, 10, 12);
      ctx.fillStyle = '#c8a020';
      ctx.fillRect(270, 338, 8, 14);
      // Candle
      ctx.fillStyle = '#eee';
      ctx.fillRect(254, 335, 4, 16);
      ctx.fillStyle = `rgba(255,200,60,${0.7 + Math.sin(t*0.12)*0.3})`;
      ctx.beginPath();
      ctx.arc(256, 333, 4 + Math.sin(t*0.1)*1, 0, Math.PI*2);
      ctx.fill();

      // Right table
      ctx.fillStyle = '#5a3418';
      ctx.fillRect(580, 360, 130, 8);
      ctx.fillStyle = '#4a2a14';
      ctx.fillRect(610, 368, 12, 40);
      ctx.fillRect(680, 368, 12, 40);
      // Items on right table
      ctx.fillStyle = '#8b1a1a';
      ctx.fillRect(600, 348, 8, 14);
      ctx.fillStyle = '#8b6914';
      ctx.fillRect(660, 346, 12, 14);
      // Candle
      ctx.fillStyle = '#eee';
      ctx.fillRect(638, 345, 4, 16);
      ctx.fillStyle = `rgba(255,200,60,${0.7 + Math.sin(t*0.11+1)*0.3})`;
      ctx.beginPath();
      ctx.arc(640, 343, 4 + Math.sin(t*0.09+1)*1, 0, Math.PI*2);
      ctx.fill();

      // Center throne/seat for Nebula
      ctx.fillStyle = '#4a2a14';
      ctx.fillRect(450, 290, 60, 50);
      ctx.fillStyle = '#6b3a18';
      ctx.fillRect(452, 270, 56, 22);
      ctx.fillStyle = '#8b6914';
      ctx.fillRect(460, 274, 40, 4);

      // Fireplace (right wall area)
      ctx.fillStyle = '#5a3418';
      ctx.fillRect(880, 160, 70, 100);
      ctx.fillStyle = '#1a0e04';
      ctx.fillRect(888, 180, 54, 70);
      // Fire
      for (let fi = 0; fi < 5; fi++) {
        const fFlicker = Math.sin(t * 0.15 + fi * 0.8) * 6;
        ctx.fillStyle = `rgba(255,${100 + fi * 30},20,${0.6 - fi * 0.08})`;
        ctx.beginPath();
        ctx.arc(915 + fFlicker, 240 - fi * 8, 12 - fi * 1.5, 0, Math.PI * 2);
        ctx.fill();
      }
      // Fireplace glow
      const fireGlow = ctx.createRadialGradient(915, 220, 10, 915, 220, 150);
      fireGlow.addColorStop(0, 'rgba(255,100,20,0.15)');
      fireGlow.addColorStop(1, 'transparent');
      ctx.fillStyle = fireGlow;
      ctx.fillRect(780, 100, 180, 250);

      // Draw characters sorted by Y for depth
      const sorted = [...positions].sort((a, b) => a.y - b.y);
      sorted.forEach(p => {
        const img = sprites[p.name];
        if (!img) return;

        const s = 64 * p.scale;
        const bob = Math.sin(t * 0.025 + positions.indexOf(p) * 0.9) * 2;
        const breathe = 1 + Math.sin(t * 0.03 + positions.indexOf(p) * 0.7) * 0.015;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(p.x, p.y + s/2 + 4, s * 0.35, 6, 0, 0, Math.PI * 2);
        ctx.fill();

        // Character
        ctx.save();
        ctx.translate(p.x, p.y + bob);
        ctx.scale(breathe, 1/breathe);
        ctx.drawImage(img, -s/2, -s/2, s, s);
        ctx.restore();

        // Nameplate
        const charData = C.find(c => c.name === p.name);
        if (charData) {
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          const nameW = ctx.measureText(charData.name).width;
          ctx.font = '8px "Press Start 2P"';
          const tw = ctx.measureText(charData.name).width;
          ctx.fillRect(p.x - tw/2 - 4, p.y - s/2 - 16 + bob, tw + 8, 14);
          ctx.fillStyle = charData.color;
          ctx.textAlign = 'center';
          ctx.fillText(charData.name, p.x, p.y - s/2 - 6 + bob);
        }
      });

      // Ambient particles (dust motes, embers from fire)
      for (let i = 0; i < 15; i++) {
        const px = (Math.sin(t * 0.008 + i * 47) * 0.5 + 0.5) * W;
        const py = (Math.cos(t * 0.006 + i * 31) * 0.5 + 0.5) * H;
        const ps = 1 + Math.sin(t * 0.02 + i) * 0.5;
        ctx.fillStyle = `rgba(255,200,100,${0.15 + Math.sin(t*0.03+i)*0.1})`;
        ctx.beginPath();
        ctx.arc(px, py, ps, 0, Math.PI * 2);
        ctx.fill();
      }

      // Vignette
      const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
      vig.addColorStop(0, 'transparent');
      vig.addColorStop(1, 'rgba(0,0,0,0.5)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      t++;
      requestAnimationFrame(drawTavern);
    }

    drawTavern();
  }
}

</script>
</body>
